<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - ClassFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; }

        /* Page Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f2f5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ddd;
            border-top-color: #764ba2; /* Theme color */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
</div>

<div class="card">
    <h4 class="text-center fw-bold mb-3">Set New Password</h4>
    
    <form id="resetForm">
        <div class="mb-3">
            <label class="form-label fw-bold">New Password</label>
            <div class="input-group">
                <input type="password" id="newPassword" class="form-control" required>
                <span class="input-group-text" id="toggleNewPassword" style="cursor: pointer;"><i class="bi bi-eye-fill"></i></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Confirm Password</label>
            <div class="input-group">
                <input type="password" id="confirmPassword" class="form-control" required>
                <span class="input-group-text" id="toggleConfirmPassword" style="cursor: pointer;"><i class="bi bi-eye-fill"></i></span>
            </div>
        </div>
        <div id="msg" class="text-center mb-3 fw-bold"></div>
        <button type="submit" class="btn btn-success w-100">Reset Password</button>
    </form>
</div>

<script>
    // Get Token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        document.body.innerHTML = '<h3 class="text-center text-danger mt-5">Invalid or missing token.</h3>';
    }

    // Hide preloader when page is fully loaded
    window.onload = function() {
        const preloader = document.getElementById('preloader');
        preloader.style.opacity = '0';
        // Wait for fade out animation to finish before hiding it completely
        setTimeout(() => { preloader.style.display = 'none'; }, 500);
    };

    function togglePasswordVisibility(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const icon = document.querySelector(`#${iconId} i`);
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('bi-eye-fill');
            icon.classList.add('bi-eye-slash-fill');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('bi-eye-slash-fill');
            icon.classList.add('bi-eye-fill');
        }
    }

    document.getElementById('toggleNewPassword').addEventListener('click', () => togglePasswordVisibility('newPassword', 'toggleNewPassword'));
    document.getElementById('toggleConfirmPassword').addEventListener('click', () => togglePasswordVisibility('confirmPassword', 'toggleConfirmPassword'));

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('msg');

        if (newPassword !== confirmPassword) {
            msg.style.color = 'red';
            msg.innerText = "Passwords do not match!";
            return;
        }

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                msg.style.color = 'green';
                msg.innerText = "Password reset successful! Redirecting...";
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                msg.style.color = 'red';
                msg.innerText = data.message;
            }
        } catch (err) {
            msg.style.color = 'red';
            msg.innerText = 'Error connecting to server.';
        }
    });
</script>
</body>
</html>
