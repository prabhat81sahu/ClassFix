<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ClassFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; }

        /* Page Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f2f5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ddd;
            border-top-color: #764ba2; /* Theme color */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
</div>

<div class="card">
    <h4 class="text-center fw-bold mb-3">Forgot Password</h4>
    <p class="text-muted text-center small">Enter your email and we'll send you a reset link.</p>
    
    <form id="forgotForm">
        <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        <div id="msg" class="text-center mb-3 fw-bold"></div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        <div class="text-center mt-3">
            <a href="login.html" class="text-decoration-none">Back to Login</a>
        </div>
    </form>
</div>

<script>
    // Hide preloader when page is fully loaded
    window.onload = function() {
        const preloader = document.getElementById('preloader');
        preloader.style.opacity = '0';
        setTimeout(() => { preloader.style.display = 'none'; }, 500);
    };

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const msg = document.getElementById('msg');
        
        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            msg.style.color = res.ok ? 'green' : 'red';
            msg.innerText = data.message;
        } catch (err) {
            msg.style.color = 'red';
            msg.innerText = 'Error connecting to server.';
        }
    });
</script>
</body>
</html>
