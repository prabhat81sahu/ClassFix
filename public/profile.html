<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - ClassFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 30px; max-width: 600px; margin: 40px auto;
            position: relative; z-index: 1;
        }
        .navbar { background: #343a40; position: relative; z-index: 1; }

        /* Background elements */
        .bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }
        .bg-elements span {
            position: absolute; display: block; list-style: none; width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.15); animation: floatUp 25s linear infinite; bottom: -180px;
        }
        .bg-elements span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; background: rgba(255, 255, 255, 0.1); }
        .bg-elements span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-elements span:nth-child(3) { left: 70%; width: 30px; height: 100px; animation-delay: 4s; background: rgba(255, 255, 255, 0.2); }
        .bg-elements span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-elements span:nth-child(5) { left: 65%; width: 40px; height: 40px; animation-delay: 1s; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: rgba(255, 255, 255, 0.25); }
        .bg-elements span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-elements span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; background: rgba(255, 255, 255, 0.15); }
        .bg-elements span:nth-child(8) { left: 50%; width: 120px; height: 5px; animation-delay: 15s; animation-duration: 45s; }
        .bg-elements span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-elements span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; border-radius: 50%; }
        }
    </style>
</head>
<body>

<div class="bg-elements">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand" href="#"><i class="bi bi-person-circle"></i> My Profile</a>
    <button onclick="goBack()" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Back to Dashboard</button>
</nav>

<div class="container">
    <div class="profile-card">
        <h4 class="mb-4 fw-bold border-bottom pb-2">Account Settings</h4>
        
        <div class="mb-3">
            <label class="fw-bold text-muted small">Username</label>
            <p id="usernameDisplay" class="fs-5">-</p>
        </div>
        <div class="mb-4">
            <label class="fw-bold text-muted small">Email</label>
            <p id="emailDisplay" class="fs-5">-</p>
        </div>

        <hr>

        <!-- Notification Toggle -->
        <h5 class="mt-4 mb-3 fw-bold"><i class="bi bi-bell"></i> Notifications</h5>
        <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="emailToggle" onchange="updatePreferences()">
            <label class="form-check-label" for="emailToggle">Receive email updates on complaint status</label>
        </div>

        <hr>

        <!-- Change Password -->
        <h5 class="mt-4 mb-3 fw-bold"><i class="bi bi-key"></i> Change Password</h5>
        <form id="passwordForm">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" id="currentPassword" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Password</button>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const role = localStorage.getItem('role') || sessionStorage.getItem('role');

    if(!token) window.location.href = 'login.html';

    // 1. Load Profile
    async function loadProfile() {
        try {
            const res = await fetch('/api/users/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const user = await res.json();
            
            if(res.ok) {
                document.getElementById('usernameDisplay').innerText = user.username;
                document.getElementById('emailDisplay').innerText = user.email;
                document.getElementById('emailToggle').checked = user.receiveNotifications;
            }
        } catch (err) {
            console.error(err);
        }
    }

    // 2. Update Preferences
    async function updatePreferences() {
        const isChecked = document.getElementById('emailToggle').checked;
        try {
            const res = await fetch('/api/users/profile', {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ receiveNotifications: isChecked })
            });
            const data = await res.json();
            if(data.success) {
                // Optional: Show toast or small feedback
                console.log("Preferences saved");
            }
        } catch (err) {
            console.error("Failed to save preference");
            // Revert toggle if failed
            document.getElementById('emailToggle').checked = !isChecked;
        }
    }

    // 3. Change Password
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;

        try {
            const res = await fetch('/api/users/change-password', {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            if(res.ok) {
                alert("Password changed successfully!");
                document.getElementById('passwordForm').reset();
            } else {
                alert(data.message || "Failed to change password");
            }
        } catch (err) {
            alert("Error connecting to server");
        }
    });

    function goBack() {
        if(role === 'Student') window.location.href = 'student.html';
        else if(role === 'Engineer') window.location.href = 'engineer.html';
        else window.location.href = 'dashboard.html';
    }

    loadProfile();
</script>
</body>
</html>
