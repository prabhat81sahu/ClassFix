<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ClassFix Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        .login-header {
            background: #ffffff;
            padding: 40px 30px 20px;
            text-align: center;
        }

        .login-header .logo-icon {
            font-size: 3rem;
            color: #23a6d5;
            margin-bottom: 10px;
            display: inline-block;
        }

        .login-body {
            padding: 30px 40px 40px;
        }

        .form-floating > label {
            color: #6c757d;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            padding: 1rem 0.75rem;
        }

        .form-control:focus {
            border-color: #23a6d5;
            box-shadow: 0 0 0 0.25rem rgba(35, 166, 213, 0.25);
        }

        .btn-login {
            background: linear-gradient(to right, #23a6d5, #23d5ab);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(35, 166, 213, 0.4);
            color: white;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="logo-icon">
            <i class="bi bi-shield-check"></i>
        </div>
        <h3 class="fw-bold text-dark mb-1">ClassFix Portal</h3>
        <p class="text-muted small">Sign in to your account</p>
    </div>
    
    <div class="login-body">
        <div id="errorAlert" class="alert alert-danger" style="display: none; border-radius: 10px; font-size: 0.9rem;" role="alert"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="Username" required>
                <label for="username"><i class="bi bi-person me-2"></i>Username</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
            </div>
            
            <button type="submit" id="loginBtn" class="btn btn-login w-100 mb-3">
                <span id="btnSpinner" class="spinner-border spinner-border-sm me-2" role="status" style="display: none;"></span>
                <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
            </button>
            
            <div class="text-center mt-3">
                <p class="text-muted small">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold" style="color: #23a6d5;"><i class="bi bi-person-plus-fill me-1"></i>Register Here</a></p>
            </div>
        </form>
    </div>
</div>

<script src="config.js"></script>
<script>
    async function handleLogin(event) {
        event.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const spinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const errorAlert = document.getElementById('errorAlert');

        // Loading state
        btn.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.innerHTML = 'Authenticating...';
        errorAlert.style.display = 'none';

        try {
            const res = await fetch(`${typeof API_BASE !== 'undefined' ? API_BASE : ''}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                // Success: Save token & metadata
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.displayName || data.username);
                if (data.domain) localStorage.setItem('domain', data.domain);

                // Role-Based Routing
                if (data.role === 'Admin') {
                    window.location.href = 'admin.html';
                } else if (data.role === 'Engineer') {
                    window.location.href = 'engineer.html';
                } else {
                    window.location.href = 'student.html';
                }
            } else {
                // Failure UI Update
                errorAlert.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${data.message || 'Invalid credentials'}`;
                errorAlert.style.display = 'block';
                resetBtn();
            }
        } catch (error) {
            console.error("Login Error:", error);
            errorAlert.innerHTML = `<i class="bi bi-wifi-off me-2"></i> Server connection failed.`;
            errorAlert.style.display = 'block';
            resetBtn();
        }
        
        function resetBtn() {
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
        }
    }
</script>
</body>
</html>
